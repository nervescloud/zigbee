name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18"
            otp: "28"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20"
            otp: "29"

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v7

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      # deps and build artifacts, keyed on the Elixir/OTP pair and mix.exs
      - uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      # only enforce formatting on the newest version in the matrix
      - run: mix format --check-formatted
        if: matrix.elixir == '1.20'

      - run: mix compile --warnings-as-errors

      - run: mix test
